# =============================================================================
# RSnowflake -- DBI Connector Config
# =============================================================================
# R environment for RSnowflake notebooks. Includes DBI, httr2, jsonlite,
# and nanoarrow for the SQL API v2 connector.
#
# Usage:
#   from sfnb_setup import install_r, install_r_packages
#   install_r(config="rsnowflake_config.yaml")
#   install_r_packages(config="rsnowflake_config.yaml", packages=["RSnowflake"])
# =============================================================================

env_name: "workspace_env"

languages:
  r:
    enabled: true
    r_version: "4.5.2"
    conda_packages:
      - r-cli
      - r-rlang>=1.0.0
      - r-reticulate>=1.25
      - r-dbi>=1.2.0
      - r-httr2>=1.0.0
      - r-jsonlite
      - r-dplyr>=1.1.0
      - r-dbplyr>=2.3.0
      - r-nanoarrow
    cran_packages: []
    addons:
      adbc: false
      duckdb: false
    tarballs:
      RSnowflake: "https://github.com/Snowflake-Labs/RSnowflake/releases/download/v0.2.0/RSnowflake_0.2.0.tar.gz"

  scala:
    enabled: false

  julia:
    enabled: false
