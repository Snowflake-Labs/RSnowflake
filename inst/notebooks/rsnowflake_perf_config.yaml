# =============================================================================
# RSnowflake -- Performance Test Config
# =============================================================================
# Extends the base RSnowflake config with ADBC support for Arrow-native
# high-performance reads/writes.
#
# Usage (single cell):
#   from sfnb_setup import setup_notebook
#   setup_notebook(config="rsnowflake_perf_config.yaml", packages=["RSnowflake"])
#
# All sections below are OPTIONAL -- sensible defaults are used when omitted.
# =============================================================================

# -- Session context (optional) -----------------------------------------------
# context:
#   warehouse: "MY_WH"
#   database: "MY_DB"
#   schema: "MY_SCHEMA"

# -- EAI settings (optional) --------------------------------------------------
# eai:
#   managed: "MY_EAI"
#   supplementary_name: "MULTILANG_NOTEBOOK_EAI"

# -- Language and package spec ------------------------------------------------
env_name: "workspace_env"

languages:
  r:
    enabled: true
    r_version: "4.5.2"
    conda_packages:
      - r-cli
      - r-rlang>=1.0.0
      - r-reticulate>=1.25
      - r-dbi>=1.2.0
      - r-httr2>=1.0.0
      - r-jsonlite
      - r-dplyr>=1.1.0
      - r-dbplyr>=2.3.0
      - r-nanoarrow
      - r-rcppsimdjson
    cran_packages: []
    addons:
      adbc: true
      duckdb: false
    tarballs:
      RSnowflake: "https://github.com/Snowflake-Labs/RSnowflake/releases/download/v0.2.0/RSnowflake_0.2.0.tar.gz"

  scala:
    enabled: false

  julia:
    enabled: false
